# configs_v2.yaml — Diseño experimental — Civilization-ABM v2
#
# Escala: N=500, 1500 steps, 60 réplicas, 41 condiciones
# Total: 41 × 60 = 2460 simulaciones ÷ 8 CPUs ≈ 2.5–3 horas
#
# Diseño experimental:
#   Bloque A — Política fiscal (5 condiciones)
#   Bloque B — Desigualdad inicial (5 condiciones)
#   Bloque C — Topología de red (4 condiciones)
#   Bloque D — Geografía del paisaje (4 condiciones)
#   Bloque E — Metabolismo base (3 condiciones)
#   Bloque F — Interacciones clave (8 condiciones)
#   Bloque G — Sensibilidad paramétrica (7 condiciones, sin N=1000)
#   Bloque H — Extremos para calibración (5 condiciones)

global:
  N: 500
  steps: 1500
  replications: 60
  n_jobs: 8
  output_dir: "results/v2"
  seed_base: 42

  # Paisaje
  landscape_width: 35
  landscape_height: 35
  landscape_peaks: 3
  growth_rate: 0.5
  vision: 1             # visión base (agentes tienen visión heterogénea 1-3)
  metabolism: 1.0       # metabolismo base (dispersión lognormal 0.6 por agente)

  # Evolución estratégica
  mutation_rate: 0.02
  evolution_interval: 5

# ------------------------------------------------------------------
# Bloque A — Política fiscal
# ------------------------------------------------------------------
conditions:

  - name: "baseline"
    description: "Sin impuesto, mundo pequeño, desigualdad media"
    tax_policy: null
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "flat_tax_low"
    description: "Impuesto proporcional bajo (tasa×0.5)"
    tax_policy: "flat"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "flat_tax"
    description: "Impuesto proporcional estándar"
    tax_policy: "flat"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "progressive_tax"
    description: "Impuesto progresivo por tramos"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "progressive_plus_floor"
    description: "Impuesto progresivo + piso social"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: true
    landscape_peaks: 3

# ------------------------------------------------------------------
# Bloque B — Desigualdad inicial (barrido completo)
# ------------------------------------------------------------------

  - name: "ineq_very_low"
    description: "Desigualdad inicial muy baja (sigma=0.3)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.3
    enforce_floor: false
    landscape_peaks: 3

  - name: "ineq_low"
    description: "Desigualdad inicial baja (sigma=0.5)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.5
    enforce_floor: false
    landscape_peaks: 3

  - name: "ineq_high"
    description: "Desigualdad inicial alta (sigma=1.2)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 1.2
    enforce_floor: false
    landscape_peaks: 3

  - name: "ineq_very_high"
    description: "Desigualdad inicial muy alta (sigma=1.8)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 1.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "ineq_extreme"
    description: "Desigualdad extrema (sigma=2.5)"
    tax_policy: null
    network_type: "small_world"
    initial_inequality: 2.5
    enforce_floor: false
    landscape_peaks: 3

# ------------------------------------------------------------------
# Bloque C — Topología de red
# ------------------------------------------------------------------

  - name: "net_small_world"
    description: "Red mundo pequeño (referencia)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "net_scale_free"
    description: "Red libre de escala (Barabási-Albert)"
    tax_policy: "progressive"
    network_type: "scale_free"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "net_random"
    description: "Red aleatoria (Erdős-Rényi)"
    tax_policy: "progressive"
    network_type: "random"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "net_none"
    description: "Sin red (interacción global aleatoria)"
    tax_policy: "progressive"
    network_type: null
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

# ------------------------------------------------------------------
# Bloque D — Geografía del paisaje
# ------------------------------------------------------------------

  - name: "land_1peak"
    description: "1 pico de recursos (máxima concentración geográfica)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 1

  - name: "land_2peaks"
    description: "2 picos de recursos"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 2

  - name: "land_4peaks"
    description: "4 picos de recursos (alta heterogeneidad)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 4

  - name: "land_6peaks"
    description: "6 picos de recursos (distribución dispersa)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 6

# ------------------------------------------------------------------
# Bloque E — Metabolismo base
# ------------------------------------------------------------------

  - name: "meta_low"
    description: "Metabolismo base bajo (0.5) — abundancia relativa"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    metabolism: 0.5

  - name: "meta_high"
    description: "Metabolismo base alto (2.0) — escasez relativa"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    metabolism: 2.0

  - name: "meta_very_high"
    description: "Metabolismo base muy alto (3.5) — supervivencia difícil"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    metabolism: 3.5

# ------------------------------------------------------------------
# Bloque F — Interacciones (factorial 2×2 para hipótesis del paper)
# ------------------------------------------------------------------

  - name: "hi_ineq_scale_free"
    description: "Alta desigualdad × red libre de escala"
    tax_policy: "progressive"
    network_type: "scale_free"
    initial_inequality: 1.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "hi_ineq_no_tax"
    description: "Alta desigualdad × sin impuesto (colapso esperado)"
    tax_policy: null
    network_type: "small_world"
    initial_inequality: 1.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "hi_ineq_floor"
    description: "Alta desigualdad × piso social"
    tax_policy: null
    network_type: "small_world"
    initial_inequality: 1.8
    enforce_floor: true
    landscape_peaks: 3

  - name: "scale_free_no_tax"
    description: "Red libre de escala × sin impuesto"
    tax_policy: null
    network_type: "scale_free"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3

  - name: "max_stress"
    description: "Máximo estrés: ineq extrema + escala libre + 1 pico + sin tax"
    tax_policy: null
    network_type: "scale_free"
    initial_inequality: 2.5
    enforce_floor: false
    landscape_peaks: 1

  - name: "max_resilience"
    description: "Máxima resiliencia: bajo ineq + progresivo + piso + 4 picos"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.3
    enforce_floor: true
    landscape_peaks: 4

  - name: "collapse_prone"
    description: "Condición diseñada para máximo colapso institucional"
    tax_policy: null
    network_type: "scale_free"
    initial_inequality: 2.5
    enforce_floor: false
    landscape_peaks: 1
    metabolism: 2.5

  - name: "resilient_society"
    description: "Sociedad con todas las protecciones activas"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.5
    enforce_floor: true
    landscape_peaks: 4
    metabolism: 0.5

# ------------------------------------------------------------------
# Bloque G — Sensibilidad paramétrica (OAT sobre baseline)
# ------------------------------------------------------------------

  - name: "sens_growth_fast"
    description: "Sensibilidad: growth_rate=2.0 (regeneración rápida)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    growth_rate: 2.0

  - name: "sens_growth_slow"
    description: "Sensibilidad: growth_rate=0.1 (regeneración muy lenta)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    growth_rate: 0.1

  - name: "sens_mutation_low"
    description: "Sensibilidad: mutation_rate=0.001 (casi sin mutación)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    mutation_rate: 0.001

  - name: "sens_mutation_high"
    description: "Sensibilidad: mutation_rate=0.15 (alta mutación)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    mutation_rate: 0.15

  - name: "sens_small_pop"
    description: "Sensibilidad: N=100 (población pequeña)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    N: 100

  - name: "sens_evolution_fast"
    description: "Sensibilidad: evolution_interval=1 (aprendizaje cada paso)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    evolution_interval: 1

  - name: "sens_evolution_slow"
    description: "Sensibilidad: evolution_interval=50 (aprendizaje muy lento)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.8
    enforce_floor: false
    landscape_peaks: 3
    evolution_interval: 50

# ------------------------------------------------------------------
# Bloque H — Calibración con Banco Mundial (targets 0.25–0.65)
# ------------------------------------------------------------------

  - name: "cal_nordic"
    description: "Calibración sociedad nórdica: Gini~0.27 (Suecia/Dinamarca)"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.3
    enforce_floor: true
    landscape_peaks: 4
    metabolism: 0.5

  - name: "cal_europe"
    description: "Calibración Europa: Gini~0.33"
    tax_policy: "progressive"
    network_type: "small_world"
    initial_inequality: 0.6
    enforce_floor: false
    landscape_peaks: 3

  - name: "cal_usa"
    description: "Calibración EE.UU.: Gini~0.41"
    tax_policy: "flat"
    network_type: "scale_free"
    initial_inequality: 1.0
    enforce_floor: false
    landscape_peaks: 3

  - name: "cal_latam"
    description: "Calibración América Latina: Gini~0.50 (Brasil/México)"
    tax_policy: "flat"
    network_type: "scale_free"
    initial_inequality: 1.5
    enforce_floor: false
    landscape_peaks: 2

  - name: "cal_southafrica"
    description: "Calibración máxima desigualdad: Gini~0.63 (Sudáfrica)"
    tax_policy: null
    network_type: "scale_free"
    initial_inequality: 2.5
    enforce_floor: false
    landscape_peaks: 1
    metabolism: 2.0
